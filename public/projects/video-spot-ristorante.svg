<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b14"/>
      <stop offset="1" stop-color="#0c1322"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <!-- grid -->
  <g stroke="#22d3ee" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="250" x2="1600" y2="250"/><line x1="0" y1="500" x2="1600" y2="500"/><line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="1000"/><line x1="800" y1="0" x2="800" y2="1000"/><line x1="1200" y1="0" x2="1200" y2="1000"/>
  </g>
  <!-- waveform -->
  <g fill="#22d3ee">
    <rect x="480" y="470" width="14" height="60" rx="7" opacity="0.5"/>
    <rect x="510" y="430" width="14" height="140" rx="7" opacity="0.7"/>
    <rect x="540" y="390" width="14" height="220" rx="7"/>
    <rect x="570" y="350" width="14" height="300" rx="7"/>
    <rect x="600" y="410" width="14" height="180" rx="7"/>
    <rect x="630" y="320" width="14" height="360" rx="7"/>
    <rect x="660" y="440" width="14" height="120" rx="7" opacity="0.7"/>
    <rect x="690" y="380" width="14" height="240" rx="7"/>
    <rect x="720" y="340" width="14" height="320" rx="7"/>
    <rect x="750" y="420" width="14" height="160" rx="7"/>
    <rect x="780" y="360" width="14" height="280" rx="7"/>
    <rect x="810" y="300" width="14" height="400" rx="7"/>
    <rect x="840" y="410" width="14" height="180" rx="7"/>
    <rect x="870" y="450" width="14" height="100" rx="7" opacity="0.7"/>
    <rect x="900" y="390" width="14" height="220" rx="7"/>
    <rect x="930" y="430" width="14" height="140" rx="7" opacity="0.7"/>
    <rect x="960" y="470" width="14" height="60" rx="7" opacity="0.5"/>
  </g>
  <!-- play button -->
  <circle cx="800" cy="500" r="90" fill="#070b14" fill-opacity="0.6" stroke="#22d3ee" stroke-width="3"/>
  <path d="M775 455 L850 500 L775 545 Z" fill="#22d3ee"/>
  <text x="120" y="160" font-family="ui-monospace,Menlo,monospace" font-size="30" fill="#22d3ee" letter-spacing="6">VIDEO · REEL</text>
  <text x="120" y="900" font-family="Arial,sans-serif" font-size="56" font-weight="700" fill="#f4f7fb">Spot Video — Ristorante</text>
</svg>
