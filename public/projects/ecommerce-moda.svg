<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="E-COMMERCE Moda">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="1" stop-color="#0e1526"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.82" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.08" cy="0.98" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#dots)"/>
  <rect width="1200" height="750" fill="url(#g1)"/>
  <rect width="1200" height="750" fill="url(#g2)"/>

  <g transform="translate(720,190)" stroke="#2dd4bf" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="0" width="280" height="190" rx="14" opacity="0.55"/>
        <line x1="0" y1="44" x2="280" y2="44" opacity="0.55"/>
        <circle cx="26" cy="22" r="6" fill="#2dd4bf" stroke="none"/><circle cx="50" cy="22" r="6" fill="#2dd4bf" stroke="none" opacity="0.6"/><circle cx="74" cy="22" r="6" fill="#2dd4bf" stroke="none" opacity="0.4"/>
        <rect x="28" y="76" width="90" height="86" rx="8" opacity="0.4"/>
        <line x1="150" y1="84" x2="250" y2="84" opacity="0.5"/><line x1="150" y1="112" x2="250" y2="112" opacity="0.35"/><line x1="150" y1="140" x2="210" y2="140" opacity="0.35"/>
        <g transform="translate(150,235)"><circle cx="6" cy="34" r="7" fill="#2dd4bf" stroke="none"/><circle cx="34" cy="34" r="7" fill="#2dd4bf" stroke="none"/><path d="M-8,0 H2 L10,26 H34" /></g>
      </g>

  <!-- brand monogramma -->
  <text x="64" y="78" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#f4f7fb" fill-opacity="0.85">ZULIAN</text>
  <text x="64" y="104" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="4" fill="#94a3b8">CASE STUDY · 2024</text>

  <!-- chip categoria -->
  <g transform="translate(64,560)">
    <rect x="0" y="0" width="222.5" height="40" rx="20" fill="#2dd4bf" fill-opacity="0.12" stroke="#2dd4bf" stroke-opacity="0.55"/>
    <circle cx="24" cy="20" r="5" fill="#2dd4bf"/>
    <text x="40" y="26" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#2dd4bf">SITI & E-COMMERCE</text>
  </g>

  <!-- titolo -->
  <text x="62" y="648" font-family="Arial, Helvetica, sans-serif" font-size="30" letter-spacing="3" fill="#94a3b8" font-weight="600">E-COMMERCE</text>
  <text x="60" y="710" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="800" fill="#f4f7fb">Moda</text>

