<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Siti & E-commerce">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/><stop offset="1" stop-color="#0e1526"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.82" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.30"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.06" cy="0.98" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.14"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#dots)"/>
  <rect width="1200" height="750" fill="url(#g1)"/>
  <rect width="1200" height="750" fill="url(#g2)"/>

  <g transform="translate(700,200)" stroke="#2dd4bf" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="0" width="300" height="200" rx="14" opacity="0.55"/>
        <line x1="0" y1="46" x2="300" y2="46" opacity="0.55"/>
        <circle cx="26" cy="23" r="6" fill="#2dd4bf" stroke="none"/><circle cx="50" cy="23" r="6" fill="#2dd4bf" stroke="none" opacity="0.6"/><circle cx="74" cy="23" r="6" fill="#2dd4bf" stroke="none" opacity="0.4"/>
        <rect x="28" y="80" width="100" height="92" rx="8" opacity="0.4"/>
        <line x1="160" y1="90" x2="270" y2="90" opacity="0.5"/><line x1="160" y1="120" x2="270" y2="120" opacity="0.35"/><line x1="160" y1="150" x2="225" y2="150" opacity="0.35"/>
      </g>

  <!-- marchio Z vettoriale (in alto a destra, niente font) -->
  <g transform="translate(1108,72)">
    <path d="M-20,-20 L20,-20 L-20,20 L20,20" stroke="#2dd4bf" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- cornice/ticks da "dossier" (puro vettoriale) -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" fill="none">
    <path d="M64,52 H110"/><path d="M64,52 V98"/>
  </g>

  <rect x="0" y="746" width="1200" height="4" fill="#2dd4bf" fill-opacity="0.85"/>
</svg>
