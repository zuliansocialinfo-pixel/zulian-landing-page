<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b14"/>
      <stop offset="1" stop-color="#0c1322"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <g stroke="#2dd4bf" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="250" x2="1600" y2="250"/><line x1="0" y1="500" x2="1600" y2="500"/><line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="1000"/><line x1="800" y1="0" x2="800" y2="1000"/><line x1="1200" y1="0" x2="1200" y2="1000"/>
  </g>
  <!-- product cards -->
  <g>
    <rect x="560" y="330" width="200" height="300" rx="16" fill="#0c1322" stroke="#2dd4bf" stroke-opacity="0.5" stroke-width="2"/>
    <rect x="585" y="360" width="150" height="160" rx="10" fill="#2dd4bf" fill-opacity="0.15"/>
    <rect x="585" y="540" width="110" height="14" rx="7" fill="#2dd4bf" fill-opacity="0.6"/>
    <rect x="585" y="568" width="70" height="14" rx="7" fill="#f4f7fb" fill-opacity="0.4"/>
    <rect x="840" y="300" width="200" height="300" rx="16" fill="#0c1322" stroke="#2dd4bf" stroke-width="2"/>
    <rect x="865" y="330" width="150" height="160" rx="10" fill="#2dd4bf" fill-opacity="0.22"/>
    <rect x="865" y="510" width="110" height="14" rx="7" fill="#2dd4bf"/>
    <rect x="865" y="538" width="70" height="14" rx="7" fill="#f4f7fb" fill-opacity="0.5"/>
  </g>
  <!-- cart -->
  <g stroke="#2dd4bf" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1080 420 h30 l24 130 h120 l24 -90 h-150"/>
    <circle cx="1140" cy="580" r="10" fill="#2dd4bf"/>
    <circle cx="1230" cy="580" r="10" fill="#2dd4bf"/>
  </g>
  <text x="120" y="160" font-family="ui-monospace,Menlo,monospace" font-size="30" fill="#2dd4bf" letter-spacing="6">E-COMMERCE · MODA</text>
  <text x="120" y="900" font-family="Arial,sans-serif" font-size="56" font-weight="700" fill="#f4f7fb">E-commerce — Moda</text>
