<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b14"/>
      <stop offset="1" stop-color="#0c1322"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <g stroke="#8b5cf6" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="250" x2="1600" y2="250"/><line x1="0" y1="500" x2="1600" y2="500"/><line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="1000"/><line x1="800" y1="0" x2="800" y2="1000"/><line x1="1200" y1="0" x2="1200" y2="1000"/>
  </g>
  <!-- brand mark abstract -->
  <g>
    <circle cx="800" cy="480" r="140" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-opacity="0.4"/>
    <polygon points="800,360 920,560 680,560" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-width="3"/>
    <circle cx="800" cy="480" r="42" fill="#8b5cf6"/>
  </g>
  <!-- palette swatches -->
  <g>
    <rect x="560" y="660" width="60" height="60" rx="12" fill="#8b5cf6"/>
    <rect x="635" y="660" width="60" height="60" rx="12" fill="#22d3ee"/>
    <rect x="710" y="660" width="60" height="60" rx="12" fill="#6366f1"/>
    <rect x="785" y="660" width="60" height="60" rx="12" fill="#f4f7fb" fill-opacity="0.8"/>
    <rect x="860" y="660" width="60" height="60" rx="12" fill="#38bdf8"/>
  </g>
  <text x="120" y="160" font-family="ui-monospace,Menlo,monospace" font-size="30" fill="#8b5cf6" letter-spacing="6">BRANDING · IDENTITÀ</text>
  <text x="120" y="900" font-family="Arial,sans-serif" font-size="56" font-weight="700" fill="#f4f7fb">Rebranding — Studio Professionale</text>
</svg>
