<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="CAMPAGNA ADS Lead Generation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="1" stop-color="#0e1526"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.82" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.08" cy="0.98" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#dots)"/>
  <rect width="1200" height="750" fill="url(#g1)"/>
  <rect width="1200" height="750" fill="url(#g2)"/>

  <g transform="translate(720,180)" stroke="#3b82f6" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="0" y1="210" x2="300" y2="210" opacity="0.5"/>
        <rect x="20" y="150" width="44" height="60" rx="6" fill="#3b82f6" stroke="none" opacity="0.45"/>
        <rect x="84" y="110" width="44" height="100" rx="6" fill="#3b82f6" stroke="none" opacity="0.6"/>
        <rect x="148" y="70" width="44" height="140" rx="6" fill="#3b82f6" stroke="none" opacity="0.8"/>
        <rect x="212" y="30" width="44" height="180" rx="6" fill="#3b82f6" stroke="none" opacity="1"/>
        <path d="M30,150 L100,108 L170,70 L240,28" opacity="0.7"/>
        <path d="M210,28 L240,28 L240,58" opacity="0.7"/>
      </g>

  <!-- brand monogramma -->
  <text x="64" y="78" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#f4f7fb" fill-opacity="0.85">ZULIAN</text>
  <text x="64" y="104" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="4" fill="#94a3b8">CASE STUDY · 2025</text>

  <!-- chip categoria -->
  <g transform="translate(64,560)">
    <rect x="0" y="0" width="75.5" height="40" rx="20" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-opacity="0.55"/>
    <circle cx="24" cy="20" r="5" fill="#3b82f6"/>
    <text x="40" y="26" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#3b82f6">ADS</text>
  </g>

  <!-- titolo -->
  <text x="62" y="648" font-family="Arial, Helvetica, sans-serif" font-size="30" letter-spacing="3" fill="#94a3b8" font-weight="600">CAMPAGNA ADS</text>
  <text x="60" y="710" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="800" fill="#f4f7fb">Lead Generation</text>

  <!-- linea accento -->
  <rect x="0" y="746" width="1200" height="4" fill="#3b82f6" fill-opacity="0.8"/>
</svg>
