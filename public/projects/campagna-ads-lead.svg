<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Ads">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/><stop offset="1" stop-color="#0e1526"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.82" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.30"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.06" cy="0.98" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.14"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#dots)"/>
  <rect width="1200" height="750" fill="url(#g1)"/>
  <rect width="1200" height="750" fill="url(#g2)"/>

  <g transform="translate(700,180)" stroke="#3b82f6" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="0" y1="210" x2="300" y2="210" opacity="0.5"/>
        <rect x="20" y="150" width="44" height="60" rx="6" fill="#3b82f6" stroke="none" opacity="0.45"/>
        <rect x="84" y="110" width="44" height="100" rx="6" fill="#3b82f6" stroke="none" opacity="0.6"/>
        <rect x="148" y="70" width="44" height="140" rx="6" fill="#3b82f6" stroke="none" opacity="0.8"/>
        <rect x="212" y="30" width="44" height="180" rx="6" fill="#3b82f6" stroke="none" opacity="1"/>
        <path d="M30,150 L100,108 L170,70 L240,28" opacity="0.7"/>
        <path d="M210,28 L240,28 L240,58" opacity="0.7"/>
      </g>

  <!-- marchio Z vettoriale (in alto a destra, niente font) -->
  <g transform="translate(1108,72)">
    <path d="M-20,-20 L20,-20 L-20,20 L20,20" stroke="#3b82f6" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- cornice/ticks da "dossier" (puro vettoriale) -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" fill="none">
    <path d="M64,52 H110"/><path d="M64,52 V98"/>
  </g>

  <rect x="0" y="746" width="1200" height="4" fill="#3b82f6" fill-opacity="0.85"/>
