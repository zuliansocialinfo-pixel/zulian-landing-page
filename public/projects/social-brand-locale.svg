<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Social">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/><stop offset="1" stop-color="#0e1526"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.82" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.30"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.06" cy="0.98" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.14"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#dots)"/>
  <rect width="1200" height="750" fill="url(#g1)"/>
  <rect width="1200" height="750" fill="url(#g2)"/>

  <g transform="translate(845,310)" stroke="#38bdf8" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="-90" cy="-70" r="16" fill="#38bdf8" stroke="none" opacity="0.9"/>
        <circle cx="70" cy="-100" r="11" fill="#38bdf8" stroke="none" opacity="0.7"/>
        <circle cx="120" cy="40" r="18" fill="#38bdf8" stroke="none" opacity="0.9"/>
        <circle cx="-40" cy="90" r="12" fill="#38bdf8" stroke="none" opacity="0.7"/>
        <circle cx="40" cy="-10" r="22" fill="#38bdf8" stroke="none" opacity="1"/>
        <g opacity="0.5">
          <line x1="-90" y1="-70" x2="40" y2="-10"/><line x1="70" y1="-100" x2="40" y2="-10"/>
          <line x1="120" y1="40" x2="40" y2="-10"/><line x1="-40" y1="90" x2="40" y2="-10"/>
          <line x1="-90" y1="-70" x2="-40" y2="90"/>
        </g>
      </g>

  <!-- marchio Z vettoriale (in alto a destra, niente font) -->
  <g transform="translate(1108,72)">
    <path d="M-20,-20 L20,-20 L-20,20 L20,20" stroke="#38bdf8" fill="none" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- cornice/ticks da "dossier" (puro vettoriale) -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" fill="none">
    <path d="M64,52 H110"/><path d="M64,52 V98"/>
  </g>

  <rect x="0" y="746" width="1200" height="4" fill="#38bdf8" fill-opacity="0.85"/>
