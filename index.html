<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zulian Social Media Marketing | Crescita Aziendale e Strategie</title>
    <meta name="description" content="Zulian Social Media Marketing: aiuto aziende e professionisti a crescere online con strategie concrete, pubblicità efficace e contenuti mirati." />
    <!-- SPA GitHub Pages: ripristina il path dopo il redirect del 404.html -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
